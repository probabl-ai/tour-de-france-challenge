name: Fetch data and score day's PRs

on:
  schedule:
    # 20:00 Europe/Paris ≈ 18:00 UTC during CEST (July)
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Tour de France year (empty = TDF_YEAR var or current year)"
        required: false
        type: string
      score_day:
        description: "Override score calendar day YYYY-MM-DD (Paris); default from fetch meta"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: fetch-and-score
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      skore_project: ${{ steps.meta.outputs.skore_project }}
      has_test: ${{ steps.meta.outputs.has_test }}
      score_day: ${{ steps.meta.outputs.score_day }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # PAT that can bypass main-protect (Contents: Read and write)
          token: ${{ secrets.DATA_PUSH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install challenge tooling
        run: pip install -e .

      - name: Fetch Tour de France data
        env:
          TDF_YEAR: ${{ inputs.year || vars.TDF_YEAR }}
        run: |
          if ! python scripts/fetch_tdf_data.py; then
            echo "::warning::Live fetch failed."
            if [ ! -s data/data.csv ]; then
              echo "No committed data.csv; failing the job."
              exit 1
            else
              echo "Keeping committed data/*.csv from the repository."
            fi
          fi

      - name: Commit updated CSVs
        run: |
          if [ -z "${{ secrets.DATA_PUSH_TOKEN }}" ]; then
            echo "::error::DATA_PUSH_TOKEN secret is missing; cannot push data to protected main."
            exit 1
          fi
          git config user.name "tdf-data-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.csv data/latest_score_meta.json || true
          git add -u data/train.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore(data): refresh Tour de France dataset"
            git push
          fi

      - name: Read score metadata
        id: meta
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          info = json.loads(Path("data/latest_score_meta.json").read_text()) if Path("data/latest_score_meta.json").exists() else {}
          override = """${{ inputs.score_day }}""".strip()
          score_day = override or info.get("score_stage_date") or ""
          project = info.get("skore_project") or "unknown_juillet"
          n_score = int(info.get("n_score") or 0)
          has_test = "true" if n_score > 0 else "false"
          print(f"skore_project={project}")
          print(f"has_test={has_test}")
          print(f"score_day={score_day}")
          Path.home().joinpath("meta_out.txt").write_text(
              f"skore_project={project}\nhas_test={has_test}\nscore_day={score_day}\n"
          )
          PY
          while IFS= read -r line; do
            echo "$line" >> "$GITHUB_OUTPUT"
          done < "$HOME/meta_out.txt"

      - name: Discover open PRs for score day
        id: matrix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/discover_day_prs.py \
            --score-day "${{ steps.meta.outputs.score_day }}" \
            --github-output

  score:
    needs: fetch
    if: needs.fetch.outputs.has_test == 'true' && needs.fetch.outputs.matrix != '{"include":[]}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.fetch.outputs.matrix) }}
    steps:
      - name: Checkout main (data + harness)
        uses: actions/checkout@v4

      - name: Overlay submission from PR #${{ matrix.pr_number }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin "pull/${{ matrix.pr_number }}/head:pr-${{ matrix.pr_number }}"
          # Keep main data/scripts; take submissions/ from the PR head
          git checkout "pr-${{ matrix.pr_number }}" -- submissions/
          if [ ! -f "submissions/${{ matrix.submission }}/submission.py" ]; then
            echo "Missing submissions/${{ matrix.submission }}/submission.py on PR head"
            ls -la submissions/ || true
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Create isolated environment
        run: |
          python -m venv .venv-sub
          source .venv-sub/bin/activate
          pip install -U pip
          pip install -e .
          if [ -f "submissions/${{ matrix.submission }}/requirements.txt" ]; then
            pip install -r "submissions/${{ matrix.submission }}/requirements.txt"
          fi

      - name: Check skore usage
        run: |
          source .venv-sub/bin/activate
          python scripts/check_skore_usage.py "submissions/${{ matrix.submission }}"

      - name: Evaluate and publish to Skore Hub
        env:
          SKORE_HUB_API_KEY: ${{ secrets.SKORE_API_KEY }}
          SKORE_WORKSPACE: tour-de-france-challenge
          SKORE_PROJECT: ${{ needs.fetch.outputs.skore_project }}
          PUBLISH_TO_HUB: "1"
          SUBMISSION_SUMMARY: "submission_summary_${{ matrix.hub_key }}.json"
        run: |
          source .venv-sub/bin/activate
          echo "Scoring PR #${{ matrix.pr_number }} as ${{ matrix.hub_key }} → ${SKORE_PROJECT}"
          python scripts/run_submission.py \
            "submissions/${{ matrix.submission }}" \
            --publish \
            --hub-key "${{ matrix.hub_key }}"

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-pr-${{ matrix.pr_number }}-${{ matrix.hub_key }}
          path: submission_summary_${{ matrix.hub_key }}.json
          if-no-files-found: ignore
