name: Validate submission PR

on:
  pull_request:
    paths:
      - "submissions/**"
      - "scripts/check_skore_usage.py"
      - "scripts/run_submission.py"
      - "data/data.csv"
      - "data/test.csv"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Find changed submissions
        id: matrix
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          SAFE = re.compile(r"^[a-zA-Z0-9_-]+$")

          base = os.environ.get("GITHUB_BASE_REF") or "main"
          try:
              subprocess.run(["git", "fetch", "origin", base, "--depth=1"], check=False)
              diff = subprocess.check_output(
                  ["git", "diff", "--name-only", f"origin/{base}...HEAD"],
                  text=True,
              )
          except Exception:
              diff = "\n".join(str(p) for p in Path("submissions").rglob("*"))

          changed = set()
          for line in diff.splitlines():
              parts = Path(line).parts
              if len(parts) >= 2 and parts[0] == "submissions" and not parts[1].startswith("_"):
                  if SAFE.match(parts[1]):
                      changed.add(parts[1])
                  else:
                      print(f"skip unsafe submission name: {parts[1]!r}")

          # Always validate touched folders that still exist with submission.py
          include = []
          for name in sorted(changed):
              sub = Path("submissions") / name
              if sub.is_dir() and (sub / "submission.py").exists():
                  include.append({"submission": name})

          # Fallback: if path filter fired but git diff empty, check all non-skeleton
          if not include:
              for p in sorted(Path("submissions").iterdir()):
                  if (
                      p.is_dir()
                      and not p.name.startswith("_")
                      and SAFE.match(p.name)
                      and (p / "submission.py").exists()
                  ):
                      include.append({"submission": p.name})

          matrix = {"include": include} if include else {"include": [{"submission": "_skeleton"}]}
          Path("matrix.json").write_text(json.dumps(matrix))
          print(json.dumps(matrix))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps(matrix)}\n")
          PY

  validate:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Create isolated environment
        env:
          SUBMISSION: ${{ matrix.submission }}
        run: |
          if ! [[ "$SUBMISSION" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "::error::Invalid submission name: $SUBMISSION"
            exit 1
          fi
          python -m venv .venv-sub
          source .venv-sub/bin/activate
          pip install -U pip
          pip install -e .
          REQ="submissions/${SUBMISSION}/requirements.txt"
          if [ -f "$REQ" ]; then
            pip install -r "$REQ"
          fi

      - name: Check skore usage
        env:
          SUBMISSION: ${{ matrix.submission }}
        run: |
          source .venv-sub/bin/activate
          python scripts/check_skore_usage.py "submissions/${SUBMISSION}"

      - name: Dry-run evaluation (no Hub publish)
        env:
          SUBMISSION: ${{ matrix.submission }}
        run: |
          source .venv-sub/bin/activate
          python scripts/run_submission.py \
            "submissions/${SUBMISSION}" \
            --allow-holdout \
            --hub-key "${SUBMISSION}"
